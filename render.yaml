services:
  - type: web
    name: autoearnx-instagram-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn render_bot:app --bind 0.0.0.0:$PORT --workers 1 --threads 8 --timeout 0
    envVars:
      - key: BOT_TOKEN
        sync: false
    healthCheckPath: /health
