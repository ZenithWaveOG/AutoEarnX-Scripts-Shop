services:
  - type: web
    name: instagram-bot
    runtime: python
    region: oregon  # or singapore, frankfurt, etc.
    plan: free
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: gunicorn bot:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_IDS
        value: "123456789,987654321"
      - key: WEBHOOK_URL
        value: "https://your-app-name.onrender.com"
      - key: DATABASE_URL
        sync: false
      - key: WEBHOOK_SECRET
        generateValue: true
